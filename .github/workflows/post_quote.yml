name: 24/7 TikTok Auto-Posting Quotes Generator

on:
  schedule:
    # Trigger automatically once a day at 2:30 AM UTC (9:30 AM Myanmar time)
    # You can change this cron schedule to run at any time you prefer!
    - cron: "0 15 * * *"
  
  # Allows you to trigger the post manually from the GitHub website at any time!
  workflow_dispatch:

# Forces all JavaScript actions to compile and execute under Node 24, silencing deprecation warnings!
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  auto-post:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout the code
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Step 2: Install Python environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    # Step 3: Install FFmpeg on Cloud Server (Ensures ffmpeg is fully updated/available)
    - name: Install FFmpeg on Cloud Server
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    # Step 4: Install python dependencies (edge-tts and requests)
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Step 5: Run the automated rendering and posting pipeline script
    - name: Run Video Generator & TikTok Auto-Poster
      run: python video_generator.py
      env:
        # Pass secrets securely into the script environment
        PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
