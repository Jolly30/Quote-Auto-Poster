name: 24/7 TikTok Auto-Posting Quotes Generator

on:
  schedule:
    # Trigger automatically once a day at 9:00 AM UTC (3:30 PM Myanmar time)
    - cron: '0 9 * * *'
  
  # Allows you to trigger the post manually from the GitHub website at any time!
  workflow_dispatch:

jobs:
  auto-post:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout the code
    - name: Checkout Repository
      uses: actions/checkout@v3

    # Step 2: Install Python environment
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    # Step 3: Install python dependencies (edge-tts and requests)
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Step 4: Run the automated rendering and posting pipeline script
    - name: Run Video Generator & TikTok Auto-Poster
      run: python video_generator.py
      env:
        # Pass secrets securely into the script environment
        PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
